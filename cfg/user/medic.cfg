exec user/binds

//red
//cl_crosshair_red 255; cl_crosshair_green 0; cl_crosshair_blue 0

//turqoise
//cl_crosshair_red 0; cl_crosshair_green 255; cl_crosshair_blue 128

//pale pink
cl_crosshair_red 255; cl_crosshair_green 128; cl_crosshair_blue 255

//hot pink
//cl_crosshair_red 255; cl_crosshair_green 0; cl_crosshair_blue 255

bind "1" "slot1; tf_use_min_viewmodels 0; r_drawviewmodel 0; viewmodel_fov 100"
bind "2" "slot2; tf_use_min_viewmodels 1; r_drawviewmodel 0; viewmodel_fov 30"
bind "3" "slot3; tf_use_min_viewmodels 0; r_drawviewmodel 1; viewmodel_fov 100"

//bind "1" "slot1"
//bind "2" "slot2"
//bind "3" "slot3"

r_drawviewmodel 1

//bind "r" "+reload"
bindtoggle "r" "r_drawviewmodel"

cl_crosshair_scale 40

alias "modeltoggle1" "alias model model2; alias modeltoggle modeltoggle2; model"
alias "modeltoggle2" "alias model model1; alias modeltoggle modeltoggle1; model"

alias "modeltoggle" "modeltoggle1"

alias "model1" "r_drawviewmodel 0; viewmodel_fov 0"
alias "model2" "r_drawviewmodel 1; viewmodel_fov 90"

alias "model" "model1"

tf_use_min_viewmodels 0
viewmodel_fov 100

alias "uberused" "slot2;+attack2;dropitem;say_team uber used !;autocall_initial"
alias "kritzused" "slot2;+attack2;dropitem;say_team kritz used !;autocall_initial"	
alias "qfused" "slot2;+attack2;dropitem;say_team qf used !;autocall_initial"	
alias "vaccused" "slot2;+attack2;dropitem;autocall_initial"
alias "+charge" "uberused"
alias "-charge" "-attack2"

alias "uberready" "say_team uber ready !"
alias "kritzready" "say_team kritz ready !"
alias "qfready" "say_team qf ready !"
alias "vaccready" ""
alias "message" "uberready"

alias "+radar" "hud_medicautocallersthreshold 150"
alias "-radar" "hud_medicautocallersthreshold 75"

alias "spam" "voicemenu 2 5"

bind "mouse2" "+charge; spam"
bind "mouse4" "message; spam"
bind "ctrl" "+radar"

bind "mouse3" "voicemenu 1 7"

bind "ins" "load_itempreset 0; alias +charge uberused; alias message uberready; alias loadout load_itempreset 0; say_team i am back on uber"
bind "home" "load_itempreset 1; alias +charge kritzused; alias message kritzready; alias loadout load_itempreset 1; say_team i am now on kritz"
bind "del" "load_itempreset 2; alias +charge qfused; alias message qfready; alias loadout load_itempreset 2; say_team i am now on quick-fix"
bind "end" "load_itempreset 3; alias +charge vaccused; alias message vaccready; alias loadout load_itempreset 3"\

//exec user/mutebinds