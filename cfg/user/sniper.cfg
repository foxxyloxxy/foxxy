exec user/binds

alias loadout load_itempreset 3

//cl_crosshair_file crosshair5
//cl_crosshair_file crosshair7

tf_use_min_viewmodels 1
viewmodel_fov 100
cl_crosshair_scale 30

alias "modeltoggle" "modeltoggle2"
alias "model" "r_drawviewmodel 0"

bind "v" "voicemenu 2 4"
bind "b" "voicemenu 2 6"
bindtoggle "r" "r_drawviewmodel"
bind "alt" "+jump"

bind "1" "slot1; model"
bind "2" "slot2; r_drawviewmodel 0"
bind "3" "slot3; r_drawviewmodel 0"