exec user/binds

tf_use_min_viewmodels 1
viewmodel_fov 70

bind "mouse4" "disguise 8 -2"
bind "mouse5" "lastdisguise"
unbind b

bind "1" "slot1; r_drawviewmodel 1; cl_crosshair_scale 40"
bind "2" "slot2; r_drawviewmodel 1; cl_crosshair_scale 30"
bind "3" "slot3; r_drawviewmodel 1; cl_crosshair_scale 30"
bind "4" "slot4; r_drawviewmodel 1; cl_crosshair_scale 30"