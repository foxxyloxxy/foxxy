exec user/binds

//cl_crosshair_red 0; cl_crosshair_green 255; cl_crosshair_blue 0
//cl_crosshair_red 32; cl_crosshair_green 227; cl_crosshair_blue 136
cl_crosshair_red 255; cl_crosshair_green 128; cl_crosshair_blue 255

tf_use_min_viewmodels 1
viewmodel_fov 100

/alias "modeltoggle" "modeltoggle2"
//alias "model" "r_drawviewmodel 0"

bind "1" "slot1; model; cl_crosshair_scale 30"
bind "2" "slot2; model; cl_crosshair_scale 30"
bind "3" "slot3; r_drawviewmodel 1; cl_crosshair_scale 30"