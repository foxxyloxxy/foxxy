exec user/binds

cl_crosshair_red 255; cl_crosshair_green 128; cl_crosshair_blue 255

tf_use_min_viewmodels 1
viewmodel_fov 100

alias "modeltoggle" "modeltoggle2"
alias "model" "r_drawviewmodel 0"

bind "1" "slot1; model; viewmodel_fov 100"
bind "2" "slot2; model; viewmodel_fov 100"
bind "3" "slot3; r_drawviewmodel 1; viewmodel_fov 100"