exec user/binds

bind r +reload

tf_use_min_viewmodels 1
viewmodel_fov 100

bind "1" "slot1; model; cl_crosshair_scale 20"
bind "2" "slot2; model; cl_crosshair_scale 30"
bind "3" "slot3; model; cl_crosshair_scale 30"
bind "4" "slot4; model; cl_crosshair_scale 30"
bind "5" "slot5; model; cl_crosshair_scale 30"

alias "modeltoggle" "modeltoggle2"
alias "model" "r_drawviewmodel 0"